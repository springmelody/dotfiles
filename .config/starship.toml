[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "рҹ”Ң"
discharging_symbol = "вҡЎ"

[[battery.display]]
threshold = 30
style = "bold red"

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вһң](bold green)"     # The "success_symbol" segment is being set to "вһң" with the color "bold green"
error_symbol = "[вң—](bold red)"

# configure directory
[directory]
format = "[$path]($style)[$lock_symbol]($lock_style) "
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"


[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 70
style = "bold dimmed white"
disabled = false

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false


[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"	
cherry_pick = "cherry"
bisect = "bisect"	
am = "am"	
am_or_rebase = "am/rebase"

[aws]
symbol = "оҢҪ  "

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[haskell]
symbol = "О» "

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "

[php]
symbol = "оҳҲ "

[python]
symbol = "рҹҗҚ "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
